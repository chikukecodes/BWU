<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <style>
    body {
      background: #7c4d4d;
      font-family: Arial, sans-serif;
      display: grid;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      width: 300px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      overflow: hidden;
      text-align: center;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card h2 {
      margin: 15px 0 5px;
      color: #333;
    }

    .card p {
      color: #777;
      font-size: 14px;
      margin: 0 20px 15px;
    }

    .card button {
      background: #007BFF;
      color: white;
      border: none;
      padding: 10px 20px;
      margin-bottom: 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .card button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://picsum.photos/300/200" alt="Profile Image">
    <h2>Shikhar</h2>
    <p>Front-End Learner | Gamer | Tech Enthusiast</p>
    <button>Follow</button>
  </div>
</body>
</html>

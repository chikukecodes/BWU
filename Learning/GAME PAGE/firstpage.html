<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChikuiZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: "Libre Baskerville", serif;
      background: #0d0d0d;
      color: #fff;
    }

    header {
      background: #1a1a1a;
      padding: 10px;
      text-align: center;
    }
  
    header h1 {
      margin: 0;
      color: #24e367;
      font-size: 2.5em;
    }

    .hero {
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h2 {
      font-size: 2.5em;
      margin-bottom: 20px;
      text-shadow: 2px 2px 8px #000;
    }

    .hero p {
      font-size: 1.2em;
      max-width: 600px;
      margin-bottom: 30px;
      text-shadow: 1px 1px 6px #000;
    }

    .hero button {
      background: #00ffcc;
      color: #000;
      border: none;
      padding: 15px 30px;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .hero button:hover {
      background: #00997a;
      color: #fff;
    }

    footer {
      background: #191919;
      text-align: center;
      padding: 15px;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>
    <h1>ChikuiZone</h1>
    
  </header>
  <P style="text-align:center; font-size:1.2em; text-shadow: 2px 2px 4px #000; color:#d9f0e5;font-family: 'calibri', serif;"> A GAME ENTHUSIAST'S DESTINATION </P>
 <video autoplay muted loop style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: -1;">
      <source src="battlefield.mp4" type="video/mp4">
      Your browser does not support the video tag </video>
  <section class="hero">
   
    <h2>GET READY TO DOMINATE THE ARENA</h2>
    <p>Dawg in to get the info related to your favorite game and upcoming updates.</p>
   <button onclick="location.href='game page.html'">DAWG IN</button>
  </section>

  <footer>
    &copy; ChikuiZone | Designed with HTML & CSS
  </footer>
</body>
</html>
